app:
  mode: simulation
  use_case: run_pbvs_with_avoidance

runtime:
  dt: 0.01
  max_steps: 200
  save_runtime_series: true

experiment:
  name: official_pbvs_run
  seed: 42
  tags: [official, pbvs, simulation]
  notes: "Official framework PBVS-ArUco-Sim integration test."

vision:
  aruco_dictionary: DICT_4X4_50
  marker_size: 0.1

planning:
  duration: 2.0
  safe_distance: 0.5
  enable_avoidance: true

tracking:
  mode: nearest_neighbor

simulation:
  backend: coppeliasim
  robot_handle: LBR_iiwa_14_R820
  camera_handle: vision_sensor
  joint_names: [LBR_iiwa_14_R820_joint1, LBR_iiwa_14_R820_joint2, LBR_iiwa_14_R820_joint3, LBR_iiwa_14_R820_joint4, LBR_iiwa_14_R820_joint5, LBR_iiwa_14_R820_joint6, LBR_iiwa_14_R820_joint7]
  obstacle_handles: [obstacle_sphere, obstacle_box]

results:
  base_dir: experiments/runs
