# Experiment Config: Multi-stage PBVS with Avoidance
# Baseline for Entrega 3 - Operational Simulation Line

experiment:
  name: pbvs_with_avoidance_baseline
  description: "Benchmarking PBVS vs PBVS + Cuckoo Search in CoppeliaSim."
  seed: 123
  tags: [simulation, baseline, pbvs, avoidance]

planning:
  duration: 5.0
  dt: 0.05

simulation:
  use_camera: true
  robot_handle: "LBR_iiwa_14_R820"
  camera_handle: "vision_sensor"
  joint_names:
    - "joint_1"
    - "joint_2"
    - "joint_3"
    - "joint_4"
    - "joint_5"
    - "joint_6"
    - "joint_7"

perception:
  kind: "aruco"
  dictionary_name: "DICT_4X4_50"
  marker_id: 10
  marker_length_m: 0.08

visual_servoing:
  kind: "pbvs"
  gain: 1.0

obstacle_avoidance:
  kind: "cuckoo_search"
  safe_distance: 0.4
  enabled: true

results:
  base_dir: "experiments/runs"
  persistence: "filesystem"
