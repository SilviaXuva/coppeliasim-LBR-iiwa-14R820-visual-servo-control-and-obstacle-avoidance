# Scenario: PBVS with ArUco Scene
# used to test position-based visual servoing with fiducial markers.

scenario_id: "pbvs_aruco_scene"
description: "Visual servoing to a target plane with ArUco marker."

targets:
  - id: "desired_camera_pose_relative_to_target"
    position: [0.0, 0.0, 0.4] # 40cm back from target center
    orientation_quat_xyzw: [0.0, 0.0, 1.0, 0.0] # facing target

perception:
  dictionary_name: "DICT_4X4_50"
  marker_id: 10
  marker_length_m: 0.08
  
simulation:
  scene_file: "visual_servoing_aruco.ttt"
  robot_initial_joint_angles: [0.0, 0.2, 0.0, -1.0, 0.0, 1.0, 0.0]
  camera_config:
    resolution_wh: [640, 480]
    fov_degrees: 60
    mount: "tool0" # camera mounted on end-effector
